[template]
cargo_generate_version = ">=0.17.4"

[placeholders.toolchain]
type = "string"
prompt = "Rust toolchain (beware: nightly works only for riscv MCUs!)"
choices = ["esp", "nightly"]
default = "esp"

[placeholders.git]
type = "bool"
prompt = "Use latest GIT versions of the esp-idf-* crates instead of released crates.io versions?"
default = true
